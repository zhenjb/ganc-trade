name: Ganc Chain Execution

on:
  push:
    branches: 
      - main
      - appreciate
  workflow_dispatch:

jobs:
  ganc-chain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- 1. PREREQUISITE: GO & IGNITE ---
      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install Ignite CLI
        run: |
          curl https://get.ignite.com/cli! | bash
          if [ -f ignite ]; then sudo mv ignite /usr/local/bin/; fi

      # --- 2. PREREQUISITE: RUST & CARGO ---
      - name: Install Rustup
        run: |
          curl --proto '=https' --tlsv1.2 https://sh.rustup.rs -sSf | sh -s -- -y
          source "$HOME/.cargo/env"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # --- 3. PREREQUISITE: CIRCOM 2 (CACHED) ---
      - name: Cache Circom Binary
        id: cache-circom
        uses: actions/cache@v3
        with:
          path: ~/.cargo/bin/circom
          key: ${{ runner.os }}-circom-v2

      - name: Build Circom 2
        if: steps.cache-circom.outputs.cache-hit != 'true'
        run: |
          rm -rf circom-build
          git clone https://github.com/iden3/circom.git circom-build
          cd circom-build
          cargo build --release
          cargo install --path circom

      # --- 4. EXECUTE GANC CHAIN PROCESS ---
      - name: Run Ganc Setup and Chain
        run: |
          echo "Initializing Ganc Environment..."
          
          # 1. Grant permissions and run your setup script
          chmod +x exe.sh
          ./exe.sh
          
          # 2. Add the directory where Ganc was installed to the PATH
          # Usually, Go/Ganc tools install to $HOME/go/bin or a local bin
          echo "$HOME/go/bin" >> $GITHUB_PATH
          echo "$(pwd)" >> $GITHUB_PATH
          
          # 3. Refresh the path for the current shell session
          export PATH=$PATH:$HOME/go/bin:$(pwd)
          
          ganc chain
