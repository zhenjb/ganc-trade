name: Ganc Chain Execution

on:
  push:
    branches: 
      - main
      - appreciate
  workflow_dispatch:

jobs:
  ganc-chain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- 1. SETUP ENVIRONMENT ---
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install Ignite CLI
        run: |
          # The script automatically installs to /usr/local/bin/ignite
          curl https://get.ignite.com/cli! | bash

      # --- 2. INSTALL GANC CLI ---
      - name: Run Ganc Setup
        run: |
          # Run your execution script
          chmod +x exe.sh
          ./exe.sh
          
          # Persist the Ganc script directory to GITHUB_PATH
          # Based on your setup.sh: SCRIPT_DIR="$HOME/scripts"
          echo "$HOME/scripts" >> $GITHUB_PATH

      # --- 3. EXECUTE GANC CHAIN ---
      - name: Execute Ganc Chain
        run: |
          # Verify Ignite and Ganc are accessible
          ignite version
          ganc version
          
          echo "Starting Ganc Chain..."
          # Running the chain command
          ganc chain
