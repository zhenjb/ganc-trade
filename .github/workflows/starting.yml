name: Ganc Chain Execution

on:
  push:
    branches: 
      - main
      - appreciate
  workflow_dispatch:

jobs:
  ganc-chain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- 1. ENVIRONMENT SETUP (Fast) ---
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install Ignite CLI
        run: |
          curl https://get.ignite.com/cli! | bash
          sudo mv ignite /usr/local/bin/

      # --- 2. EXECUTE YOUR SETUP SCRIPTS ---
      - name: Install Ganc CLI via exe.sh
        run: |
          # 1. Run your setup logic
          chmod +x exe.sh
          ./exe.sh
          
          # 2. MANDATORY: Map your custom script directory to GitHub Path
          # Your setup.sh defines SCRIPT_DIR="$HOME/scripts"
          echo "$HOME/scripts" >> $GITHUB_PATH

      # --- 3. RUN GANC CHAIN ---
      - name: Execute Ganc Chain
        run: |
          # Verify path is updated
          echo "Current Path: $PATH"
          
          # Now 'ganc' will be found globally
          ganc chain
