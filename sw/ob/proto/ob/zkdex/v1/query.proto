syntax = "proto3";
package ob.zkdex.v1;

import "amino/amino.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "ob/zkdex/v1/params.proto";
import "ob/zkdex/v1/types.proto";

option go_package = "ob/x/zkdex/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/ob/zkdex/v1/params";
  }
  // ModuleAccountAddress queries the zkdex module account address.
  rpc ModuleAccountAddress(QueryModuleAccountAddressRequest) returns (QueryModuleAccountAddressResponse) {
    option (google.api.http).get = "/ob/zkdex/v1/module_account_address";
  }
  // ModuleAccountBalance queries the zkdex module account spendable balance.
  rpc ModuleAccountBalance(QueryModuleAccountBalanceRequest) returns (QueryModuleAccountBalanceResponse) {
    option (google.api.http).get = "/ob/zkdex/v1/module_account_balance";
  }
  // CurrentStateRoot queries the current state root.
  rpc CurrentStateRoot(QueryCurrentStateRootRequest) returns (QueryCurrentStateRootResponse) {
    option (google.api.http).get = "/ob/zkdex/v1/current_state_root";
  }
  // DepositRecord queries a deposit record by ID.
  rpc DepositRecord(QueryDepositRecordRequest) returns (QueryDepositRecordResponse) {
    option (google.api.http).get = "/ob/zkdex/v1/deposit_record/{deposit_id}";
  }
  // WithdrawRecord queries a withdraw record by ID.
  rpc WithdrawRecord(QueryWithdrawRecordRequest) returns (QueryWithdrawRecordResponse) {
    option (google.api.http).get = "/ob/zkdex/v1/withdraw_record/{withdraw_id}";
  }
  // NullifierUsed queries if a nullifier is used.
  rpc NullifierUsed(QueryNullifierUsedRequest) returns (QueryNullifierUsedResponse) {
    option (google.api.http).get = "/ob/zkdex/v1/nullifier_used/{nullifier}";
  }
  // DepositProcessed queries if a deposit is processed.
  rpc DepositProcessed(QueryDepositProcessedRequest) returns (QueryDepositProcessedResponse) {
    option (google.api.http).get = "/ob/zkdex/v1/deposit_processed/{deposit_id}";
  }
  // BatchRecord queries a batch record by ID.
  rpc BatchRecord(QueryBatchRecordRequest) returns (QueryBatchRecordResponse) {
    option (google.api.http).get = "/ob/zkdex/v1/batch_record/{batch_id}";
  }
}

// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

message QueryModuleAccountAddressRequest {}

message QueryModuleAccountAddressResponse {
  string address = 1;
}

message QueryModuleAccountBalanceRequest {
  // denom optionally filters the module account balance to one denomination.
  string denom = 1;
}

message QueryModuleAccountBalanceResponse {
  string balance = 1;
}

message QueryCurrentStateRootRequest {}

message QueryCurrentStateRootResponse {
  string state_root = 1;
}

message QueryDepositRecordRequest {
  string deposit_id = 1;
}

message QueryDepositRecordResponse {
  DepositRecord record = 1;
}

message QueryWithdrawRecordRequest {
  string withdraw_id = 1;
}

message QueryWithdrawRecordResponse {
  WithdrawRecord record = 1;
}

message QueryNullifierUsedRequest {
  string nullifier = 1;
}

message QueryNullifierUsedResponse {
  bool used = 1;
}

message QueryDepositProcessedRequest {
  string deposit_id = 1;
}

message QueryDepositProcessedResponse {
  bool processed = 1;
}

message QueryBatchRecordRequest {
  string batch_id = 1;
}

message QueryBatchRecordResponse {
  BatchRecord record = 1;
}
